name: umami_analytics
description: >-
  A production-quality Flutter package for Umami analytics with offline support,
  automatic page view tracking, and configurable logging.
version: 0.2.0
repository: https://github.com/cKreymborg/umami_analytics
issue_tracker: https://github.com/cKreymborg/umami_analytics/issues

topics:
  - analytics
  - umami
  - tracking
  - privacy
  - offline

platforms:
  android:
  ios:
  macos:
  linux:
  windows:

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  sqflite: ^2.4.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4
